<!doctype html>
<html>
  <body style="margin:0;background:#f8f5f1;font-family:Arial,sans-serif;color:#241212;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f8f5f1;padding:32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;background:#ffffff;border:1px solid #eadfd8;border-radius:16px;overflow:hidden;">
            <tr>
              <td style="padding:28px 28px 12px;">
                <h1 style="margin:0;font-size:24px;line-height:1.25;color:#241212;">Set up your Bagstreet account</h1>
              </td>
            </tr>
            <tr>
              <td style="padding:0 28px 24px;font-size:15px;line-height:1.6;color:#4e403b;">
                <p>Hello {{name}},</p>
                <p>Use the button below to choose a password and activate your customer account. This link expires soon for your security.</p>
                <p style="margin:28px 0;">
                  <a href="{{setupUrl}}" style="display:inline-block;background:#922f45;color:#ffffff;text-decoration:none;font-weight:700;border-radius:10px;padding:12px 18px;">Set Password</a>
                </p>
                <p style="font-size:13px;color:#766760;">If the button does not work, copy and paste this link into your browser:</p>
                <p style="font-size:12px;line-height:1.5;word-break:break-all;color:#922f45;">{{setupUrl}}</p>
              </td>
            </tr>
          </table>
          <p style="margin:18px 0 0;font-size:12px;color:#8b7c76;">&copy; {{year}} Bagstreet</p>
        </td>
      </tr>
    </table>
  </body>
</html>
