<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Bagstreet order {{orderRef}} is confirmed</title>
</head>
<body style="margin:0;padding:0;background:#f0ece6;font-family:'DM Sans',Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f0ece6;padding:40px 16px;">
    <tr>
      <td align="center">
        <table width="560" cellpadding="0" cellspacing="0" style="background:#F7F4EF;max-width:560px;width:100%;">

          <!-- Header -->
          <tr>
            <td style="padding:40px 40px 0;">
              <p style="margin:0;font-size:22px;font-weight:300;letter-spacing:0.2em;text-transform:uppercase;color:#3D1A14;">
                Bagstreet
              </p>
              <p style="margin:6px 0 0;font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:#9a8a7a;">
                Order Confirmed
              </p>
            </td>
          </tr>

          <!-- Divider -->
          <tr><td style="padding:24px 40px 0;"><hr style="border:none;border-top:1px solid #e8e0d5;margin:0;" /></td></tr>

          <!-- Greeting -->
          <tr>
            <td style="padding:32px 40px 0;">
              <p style="margin:0 0 12px;font-size:15px;color:#3D1A14;">Hi {{name}},</p>
              <p style="margin:0 0 24px;font-size:14px;line-height:1.7;color:#5a4a3a;">
                Thank you for your order. We've received it and will begin processing shortly.
              </p>
              <p style="margin:0 0 12px;font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:#9a8a7a;">
                Order {{orderRef}}
              </p>
            </td>
          </tr>

          <!-- Items table -->
          <tr>
            <td style="padding:0 40px;">
              <table width="100%" cellpadding="0" cellspacing="0">
                {{itemsHtml}}
                <!-- Total row -->
                <tr>
                  <td style="padding:14px 0 0;font-size:13px;font-weight:600;color:#3D1A14;letter-spacing:0.05em;">
                    Total
                  </td>
                  <td style="padding:14px 0 0;text-align:right;font-family:monospace;font-size:14px;color:#3D1A14;">
                    KES {{totalAmount}}
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Shipping address -->
          <tr>
            <td style="padding:32px 40px 0;">
              <table width="100%" cellpadding="0" cellspacing="0" style="background:#EDE8E0;">
                <tr>
                  <td style="padding:16px 20px;">
                    <p style="margin:0 0 8px;font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:#9a8a7a;">
                      Shipping to
                    </p>
                    <p style="margin:0;font-size:13px;color:#3D1A14;line-height:1.7;">
                      {{shippingName}}<br />
                      {{shippingAddress}}<br />
                      {{shippingCity}}
                    </p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding:32px 40px;border-top:1px solid #e8e0d5;margin-top:32px;text-align:center;">
              <p style="margin:0;font-size:11px;color:#b0a090;">
                © {{year}} Bagstreet
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
